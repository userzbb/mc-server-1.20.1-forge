services:
  ## ========== MCSManager Web 管理面板 ==========
  mcsm-web:
    image: githubyumao/mcsmanager-web:latest
    container_name: mcsm-web
    ports:
      - "23333:23333"                # ✅ Web 管理界面端口
    extra_hosts:
      - "catzizimiku.top:host-gateway"  # 后端通过宿主机转发连 daemon
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./mcsm/web/data:/opt/mcsmanager/web/data   # Web 数据持久化
      - ./mcsm/web/logs:/opt/mcsmanager/web/logs   # Web 日志持久化
    restart: unless-stopped

  ## ========== MCSManager 守护进程 ==========
  mcsm-daemon:
    image: githubyumao/mcsmanager-daemon:latest
    container_name: mcsm-daemon
    ports:
      - "24444:24444"                # ✅ 守护进程 API 端口
    environment:
      - MCSM_DOCKER_WORKSPACE_PATH=/home/yuan/minecraft-server/mcsm/daemon/data/InstanceData
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./mcsm/daemon/data:/opt/mcsmanager/daemon/data   # 守护进程数据持久化
      - ./mcsm/daemon/logs:/opt/mcsmanager/daemon/logs   # 守护进程日志持久化
      - /var/run/docker.sock:/var/run/docker.sock       # 让面板能管理 Docker
    restart: unless-stopped

  ## DDNS-GO（动态域名解析）
  ddns-go:
    image: jeessy/ddns-go:latest
    container_name: ddns-go
    network_mode: "host"             # ✅ 使用 host 网络，直接占用宿主机 9876 端口
    # 如果你想用端口映射，注释掉上面那行，改用下面这两行：
    # ports:
    #   - "9876:9876"
    volumes:
      - ./ddns-go-data:/root
    restart: unless-stopped
